<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>沧浪群贤匹配测试</title>
<style>
/* ============================================
   全局样式 - 沧浪亭标准色配色
   主色：#b3e165  辅色：#85e1cc  点缀：#77c6e7
   背景：深色 #0a0f1a  文字：白色 #ffffff
   ============================================ */
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --primary: #b3e165;
  --secondary: #85e1cc;
  --accent: #77c6e7;
  --bg: #f5f0e8;
  --text: #3d2c2c;
  --text-light: #8b7355;
}
html, body {
  width: 100%; height: 100%;
  font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  touch-action: pan-y;
}

/* ---------- 页面容器 ---------- */
.page {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  transition: opacity 0.5s, transform 0.5s;
  opacity: 0; pointer-events: none;
  transform: translateX(30px);
  overflow-y: auto;
  overflow-x: hidden;
}
.page.active {
  opacity: 1; pointer-events: auto;
  transform: translateX(0);
}

/* ---------- 几何图案背景 ---------- */
.page::before {
  content: "";
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  opacity: 0.5; z-index: 0;
  pointer-events: none;
  background-image: url("bg-texture.png");
  background-size: 400px 400px;
  background-repeat: repeat;
}

/* ---------- 装饰边框 ---------- */
.border-frame {
  position: relative; z-index: 1;
  width: 92%; max-width: 400px;
  padding: 28px 22px;
  border: 1.5px solid rgba(179,225,101,0.4);
  border-radius: 12px;
  background: rgba(245, 240, 232, 0.92);
  box-shadow: 0 0 0 1px rgba(133,225,204,0.1), 0 8px 32px rgba(0,0,0,0.06);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}

/* ============================================
   首页样式
   ============================================ */
.home-title {
  font-size: 26px; font-weight: 700;
  color: var(--text); text-align: left;
  letter-spacing: 2px; margin-bottom: 16px;
  line-height: 1.4;
}
.home-intro {
  font-size: 13px; color: var(--text-light);
  text-align: left; line-height: 1.9;
  margin-bottom: 16px;
  text-indent: 2em;
}
.home-intro p {
  margin-bottom: 10px;
  text-indent: 2em;
}
.home-start-text {
  font-size: 15px; color: #3d2c2c;
  text-align: left; margin: 20px 0;
  font-weight: 600;
  letter-spacing: 2px;
}
/* 分隔线 */
.divider {
  width: 60%; height: 1px; margin: 16px 0;
  background: linear-gradient(to right, transparent, var(--primary), transparent);
}
/* 按钮 */
.btn-start {
  display: block; width: 100%; padding: 14px 0;
  background: var(--primary);
  color: #fff; font-size: 17px; font-weight: 700; letter-spacing: 4px;
  border: none; border-radius: 8px; cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 4px 20px rgba(179,225,101,0.25);
}
.btn-start:active {
  transform: scale(0.97);
  box-shadow: 0 2px 10px rgba(179,225,101,0.25);
}
/* 山水装饰图 */
.mountain-art {
  width: 100%; height: 130px; margin-bottom: 12px;
  position: relative; overflow: visible;
}
.mountain-art svg { width: 100%; height: 100%; }

/* ============================================
   答题页样式
   ============================================ */
#page-quiz {
  padding: 16px;
}
#page-quiz .border-frame {
  height: calc(100vh - 32px);
  display: flex;
  flex-direction: column;
}
.quiz-header {
  width: 100%; display: flex; justify-content: space-between;
  align-items: center; margin-bottom: 12px;
  flex-shrink: 0;
}
.quiz-progress-text {
  font-size: 13px; color: #8b7355;
}
.quiz-progress-bar {
  width: 100%; height: 6px; background: rgba(0,0,0,0.08);
  border-radius: 3px; margin-bottom: 16px; overflow: hidden;
  flex-shrink: 0;
}
.quiz-progress-fill {
  height: 100%; border-radius: 3px;
  background: linear-gradient(to right, var(--primary), var(--secondary));
  transition: width 0.4s ease;
}
.quiz-question {
  font-size: 16px; font-weight: 600;
  color: #3d2c2c; line-height: 1.7;
  margin-bottom: 16px; text-align: left;
  flex-shrink: 0;
}
.quiz-options {
  display: flex; flex-direction: column; gap: 10px;
  flex: 1;
}
.quiz-option {
  padding: 12px 14px;
  border: 1.5px solid var(--primary);
  border-radius: 8px; background: var(--primary);
  font-size: 14px; color: #fff;
  cursor: pointer; transition: all 0.25s;
  text-align: left; line-height: 1.5;
  position: relative; padding-left: 38px;
}
.quiz-option::before {
  content: attr(data-label);
  position: absolute; left: 12px; top: 50%;
  transform: translateY(-50%);
  width: 20px; height: 20px;
  border: 1.5px solid #fff; border-radius: 50%;
  font-size: 11px; color: #fff;
  display: flex; align-items: center; justify-content: center;
  line-height: 1;
}
.quiz-option:active {
  background: var(--secondary); border-color: var(--secondary);
}
.quiz-option.selected {
  background: var(--secondary); border-color: var(--secondary);
  color: #fff; font-weight: 600;
}
.quiz-option.selected::before {
  background: #fff; color: var(--secondary);
}

/* ============================================
   结果页样式
   ============================================ */
.result-header {
  display: flex; align-items: flex-start;
  gap: 14px; margin-bottom: 16px;
}
.result-image {
  width: 50%; height: auto;
  aspect-ratio: 3/4;
  background: linear-gradient(135deg, rgba(179,225,101,0.1), rgba(133,225,204,0.15));
  border-radius: 8px;
  flex-shrink: 0;
  overflow: hidden;
}
.result-basic-info {
  flex: 1;
}
.result-label {
  font-size: 12px; color: var(--text-light);
  margin-bottom: 4px;
  text-align: center;
}
.result-name {
  font-size: 28px; font-weight: 700;
  color: var(--primary); letter-spacing: 3px;
  margin-bottom: 6px;
  text-align: left;
}
.result-era {
  font-size: 12px; color: var(--text-light);
  letter-spacing: 1px;
  line-height: 1.6;
  text-align: left;
}
.result-match-title {
  font-size: 20px; font-weight: 700;
  color: var(--secondary);
  text-align: center;
  margin-bottom: 12px;
}
.result-quote {
  font-size: 12px; color: var(--secondary);
  font-style: italic;
  padding: 10px 14px;
  background: rgba(133,225,204,0.1);
  border-radius: 8px;
  text-align: center;
  margin: 12px 0 16px 0;
  border-left: 3px solid var(--accent);
}

/* 相似度 */
.result-similarity {
  text-align: center;
  margin: 16px 0;
  padding: 12px;
  background: rgba(179,225,101,0.12);
  border-radius: 8px;
}
.result-similarity-text {
  font-size: 15px; color: #3d2c2c;
  font-weight: 600;
}
.result-similarity-num {
  font-size: 36px; font-weight: 700;
  color: var(--primary);
  margin: 4px 0;
}

/* 选择说明 */
.result-analysis {
  font-size: 13px; color: #3d2c2c;
  line-height: 2;
  text-align: justify;
  text-indent: 2em;
  margin-bottom: 16px;
  padding: 12px 14px;
  background: rgba(133,225,204,0.08);
  border-radius: 8px;
}

/* 信息区块 */
.result-section {
  margin-bottom: 14px;
}
.result-section-title {
  font-size: 14px; font-weight: 600;
  color: var(--primary); margin-bottom: 8px;
  display: flex; align-items: center;
  gap: 6px;
}
.result-section-title::before {
  content: "";
  width: 4px; height: 16px;
  background: var(--primary);
  border-radius: 2px;
}
.result-section-content {
  font-size: 13px; color: var(--text-light);
  line-height: 1.9;
  text-align: justify;
}
.result-poems {
  font-size: 12px; color: var(--text-light);
  line-height: 2;
  padding-left: 12px;
  border-left: 2px solid var(--secondary);
}
.result-location {
  font-size: 13px; color: var(--accent);
  background: rgba(119,198,231,0.1);
  padding: 10px 12px;
  border-radius: 8px;
  display: inline-block;
}

.btn-restart {
  display: block; width: 100%; padding: 12px 0;
  background: transparent; color: var(--secondary);
  font-size: 15px; letter-spacing: 3px;
  border: 1.5px solid var(--secondary); border-radius: 8px;
  cursor: pointer; transition: all 0.3s;
  margin-top: 20px;
}
.btn-restart:active {
  background: var(--secondary); color: #3d2c2c;
}

/* ---------- 淡入动画 ---------- */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
.fade-in { animation: fadeInUp 0.6s ease forwards; }

/* ---------- 柳叶飘落装饰 ---------- */
.leaf {
  position: fixed; z-index: 0; pointer-events: none;
  width: 20px; height: 8px;
  background: var(--primary);
  border-radius: 50%;
  opacity: 0;
  animation: leafFall linear infinite;
}
@keyframes leafFall {
  0%   { transform: translateY(-30px) rotate(0deg) translateX(0); opacity: 0; }
  5%   { opacity: 0.6; }
  50%  { transform: translateY(50vh) rotate(180deg) translateX(30px); opacity: 0.5; }
  90%  { opacity: 0.4; }
  100% { transform: translateY(100vh) rotate(360deg) translateX(-20px); opacity: 0; }
}

/* 结果页铺满全屏 */
#page-result {
  justify-content: flex-start;
  padding: 20px 16px;
  overflow-y: hidden;
}
#page-result .border-frame {
  width: 96%;
  max-width: 420px;
  height: auto;
  min-height: 90vh;
  border: 2px solid var(--primary);
  border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  background: #fff;
  padding: 24px 20px;
  overflow-y: auto;
}
</style>
</head>

<!-- ==================== 首页 ==================== -->
<div id="page-home" class="page active">

    <div class="home-title">欢迎来到<br>沧浪群贤匹配测试！</div>
    
    <div class="home-intro">
      <p>沧浪亭五百贤祠刻录了594方历代人物平雕石刻像，涵盖春秋至清末约2500年间的苏州籍或曾在苏州为官、生活者。</p>
      <p>这里有心怀家国、勤政爱民的仕宦名臣，有寄情山水、诗文传世的风雅文人，有刚正不阿、坚守气节的忠义志士，也有博学笃行、潜心治学的儒林雅士。</p>
      <p>如果穿越到那个时代，面对和他们一样的困境，你的选择会和谁相似呢？</p>
    </div>
    
    <div class="divider"></div>
    <div class="home-start-text">现在就开启一场穿越之旅</div>
    <button class="btn-start" onclick="startQuiz()">开始答题</button>

</div>

<!-- ==================== 答题页 ==================== -->
<div id="page-quiz" class="page">

    <div class="quiz-header">

<!-- ==================== 结果页 ==================== -->
<div id="page-result" class="page">

    <div class="result-match-title" id="result-match-title">你的匹配贤人是：</div>

    <div class="result-header">

      </div>
      <div class="result-basic-info">
        <div class="result-name" id="result-name"></div>

    <div class="result-similarity">

    <div class="result-section">

    </div>

    </div>

    <!-- 石刻像方位 -->
    <div class="result-section">
      <div class="result-section-title">石刻像方位</div>
      <div class="result-location" id="result-location"></div>
    </div>

    <button class="btn-restart" onclick="restart()">再测一次</button>
  </div>
</div>

/* ================================================================
   ★★★ 逻辑区域 ★★★
   ================================================================ */
let currentQ = 0;
const scores = {};

function startQuiz() {
  currentQ = 0;
  Object.keys(characters).forEach(k => scores[k] = 0);
  showPage('page-quiz');
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQ];
  document.getElementById('progress-text').textContent = (currentQ + 1) + ' / ' + questions.length;
  document.getElementById('progress-fill').style.width = ((currentQ + 1) / questions.length * 100) + '%';
  document.getElementById('question-text').textContent = q.text;

  const container = document.getElementById('options-container');
  container.innerHTML = '';
  q.options.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'quiz-option';
    div.setAttribute('data-label', labels[i]);
    div.textContent = opt.text;
    div.addEventListener('click', () => selectOption(div, opt.scores));
    container.appendChild(div);
  });
}

function selectOption(el, optScores) {
  // 视觉反馈
  document.querySelectorAll('.quiz-option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');

  // 累加分数
  Object.keys(optScores).forEach(k => {
    scores[k] = (scores[k] || 0) + optScores[k];
  });

  // 延迟跳转下一题
  setTimeout(() => {
    currentQ++;
    if (currentQ < questions.length) {
      renderQuestion();
    } else {
      showResult();
    }
  }, 400);
}

function showResult() {
  // 找最高分人物
  let maxScore = -1, maxIdx = 0;
  Object.keys(scores).forEach(k => {
    if (scores[k] > maxScore) { maxScore = scores[k]; maxIdx = parseInt(k); }
  });

  const c = characters[maxIdx];
  document.getElementById('result-name').textContent = c.name;
  document.getElementById('result-era').textContent = c.era;
  document.getElementById('result-portrait').src = 'images/' + maxIdx + '_portrait.png';
  document.getElementById('result-match').textContent = c.match;
  document.getElementById('result-analysis').textContent = c.analysis;
  document.getElementById('result-poems').innerHTML = c.poems.replace(/\n/g, '<br>');
  document.getElementById('result-location').textContent = c.location;
  document.getElementById('result-bio').textContent = c.bio;
  document.getElementById('result-suzhou').textContent = c.suzhou;

  showPage('page-result');
}

function restart() {
  showPage('page-home');
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ---------- 飘落竹叶 ---------- */
(function createLeaves() {
  const container = document.getElementById('leaves-container');
  const colors = ['#b3e165', '#85e1cc', '#77c6e7'];
  for (let i = 0; i < 15; i++) {
    const leaf = document.createElement('div');
    leaf.className = 'leaf';
    leaf.style.left = Math.random() * 100 + 'vw';
    leaf.style.animationDuration = (8 + Math.random() * 12) + 's';
    leaf.style.animationDelay = (Math.random() * 10) + 's';
    leaf.style.background = colors[i % 3];
    leaf.style.width = (16 + Math.random() * 8) + 'px';
    leaf.style.height = (6 + Math.random() * 4) + 'px';
    container.appendChild(leaf);
  }
})();
</script>
